<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const fbConfig = {
  apiKey: "AIzaSyA3MfTkuXeovGICNaq_bH-9AVF1w6iYRB0",
  authDomain: "lunch-18d6f.firebaseapp.com",
  projectId: "lunch-18d6f",
  storageBucket: "lunch-18d6f.firebasestorage.app",
  messagingSenderId: "145030486776",
  appId: "1:145030486776:web:083f901f205ee2ce1a790d"
};
const app = initializeApp(fbConfig);
const db  = getFirestore(app);
async function loadUsers() {
  const snap = await getDocs(collection(db, 'users'));
  snap.forEach(d => { USERS[d.id] = d.data(); });
}

async function saveUser(id) {
  await setDoc(doc(db, 'users', id), USERS[id]);
}

async function loadMenu() {
  const snap = await getDoc(doc(db, 'menu', 'week'));
  if (snap.exists()) {
    const data = snap.data();
    DAYS.forEach((d, i) => {
      if (data[i]) menu[i] = data[i];
    });
  }
}

async function saveMenu() {
  const obj = {};
  DAYS.forEach((d, i) => { obj[i] = menu[i]; });
  await setDoc(doc(db, 'menu', 'week'), obj);
}

async function initUsersToFirebase() {
  for (const [id, u] of Object.entries(USERS)) {
    const ref = doc(db, 'users', id);
    const snap = await getDoc(ref);
    if (!snap.exists()) await setDoc(ref, u);
  }
}

async function startup() {
  await initUsersToFirebase();
  await loadUsers();
  await loadMenu();
}
startup();

  "10312": { pin:"0082", balance:0, isAdmin:false, log:[] },
  "10313": { pin:"0083", balance:0, isAdmin:false, log:[] },
  "10314": { pin:"0084", balance:0, isAdmin:false, log:[] },
  "10315": { pin:"0085", balance:0, isAdmin:false, log:[] },
  "10316": { pin:"0086", balance:0, isAdmin:false, log:[] },
  "10317": { pin:"0087", balance:0, isAdmin:false, log:[] },
  "10318": { pin:"0088", balance:0, isAdmin:false, log:[] },
  "10319": { pin:"0089", balance:0, isAdmin:false, log:[] },
  "10320": { pin:"0090", balance:0, isAdmin:false, log:[] },
  "10321": { pin:"0091", balance:0, isAdmin:false, log:[] },
  "10322": { pin:"0092", balance:0, isAdmin:false, log:[] },
  "10323": { pin:"0093", balance:0, isAdmin:false, log:[] },
  "10324": { pin:"0094", balance:0, isAdmin:false, log:[] },
  "10325": { pin:"0095", balance:0, isAdmin:false, log:[] },
  "10326": { pin:"0096", balance:0, isAdmin:false, log:[] },
  "10327": { pin:"0097", balance:0, isAdmin:false, log:[] },
  "10328": { pin:"0098", balance:0, isAdmin:false, log:[] },
  "10329": { pin:"0099", balance:0, isAdmin:false, log:[] },
  "10330": { pin:"0100", balance:0, isAdmin:false, log:[] },
  "10331": { pin:"0101", balance:0, isAdmin:false, log:[] },
  "10332": { pin:"0102", balance:0, isAdmin:false, log:[] },
  "10333": { pin:"0103", balance:0, isAdmin:false, log:[] },
  "10334": { pin:"0104", balance:0, isAdmin:false, log:[] },
  "10335": { pin:"0105", balance:0, isAdmin:false, log:[] },
  "1": { pin:"1111", balance:1000000, isAdmin:false, log:[] },
  "admin": { pin:"0000", balance:0, isAdmin:true,  log:[] },
};

const DAYS  = ['一','二','三','四','五'];
const DRINK = [{ name:"紅茶", add:15  },{ name:"綠茶", add:15  },{ name:"奶茶", add:25 },];
const menu = DAYS.map(() => ({ bento: [], western: [] }));

let me = null, pick = {}, day = 0, type = 'bento', edit = null;

function uid() { return Math.random().toString(36).slice(2,8); }
function ts() {
  const d = new Date();
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function closed() {
  const n = new Date();
  return n.getHours()*60 + n.getMinutes() >= 8*60+30;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function go(id) {
  document.getElementById('pgLogin').style.display = id==='pgLogin' ? 'flex' : 'none';
  ['pgOrder','pgAdmin','pgMenu','pgDonate'].forEach(p => {
    document.getElementById(p).style.display = id===p ? 'block' : 'none';
  });
  if (id==='pgAdmin') drawUsers();
  if (id==='pgMenu')  drawMenuPage();
}

function doLogin() {
  const user = document.getElementById('iUser').value.trim();
  const pin  = document.getElementById('iPin').value;
  const err  = document.getElementById('errmsg');
  if (!USERS[user]) { err.textContent='找不到此帳號'; err.style.display='block'; return; }
  if (USERS[user].pin !== pin) { err.textContent='密碼錯誤，請再試一次'; err.style.display='block'; document.getElementById('iPin').value=''; return; }
  me = user;
  document.getElementById('face').textContent = user.slice(-2);
  document.getElementById('face').style.background = USERS[user].isAdmin ? '#FCEBEB' : '#EAF3DE';
  document.getElementById('face').style.color = USERS[user].isAdmin ? '#A32D2D' : '#3B6D11';
  document.getElementById('face').textContent = USERS[user].isAdmin ? '管理' : user.slice(-2);
  document.getElementById('btnAdmin').classList.toggle('hide', !USERS[user].isAdmin);
  document.getElementById('btnMenu').classList.toggle('hide',  !USERS[user].isAdmin);
  document.querySelector('.container').style.display = 'flex';
  drawBalance();
  const n = new Date(), wd = ['日','一','二','三','四','五','六'];
  document.getElementById('dateEl').textContent = `星期${wd[n.getDay()]}・${n.getMonth()+1} 月 ${n.getDate()} 日`;
  drawCut();
  resetPick();
  drawMeals();
  go('pgOrder');
}
function clearErr() { const e=document.getElementById('errmsg'); e.style.display='none'; e.textContent=''; }
function doLogout() {
  me = null;
  document.getElementById('iUser').value = '';
  document.getElementById('iPin').value = '';
  clearErr();
  go('pgLogin');
  document.querySelector('.container').style.display = 'none';
}
function drawBalance() { document.getElementById('moneyEl').textContent = `餘額 $${USERS[me].balance}`; }

function drawCut() {
  const el = document.getElementById('cutEl');
  const sb = document.getElementById('btnSend');
  if (closed()) {
    el.innerHTML = '<div class="cutclose">今日點餐已截止（08:30）</div>';
    sb.disabled = true; sb.textContent = '點餐已截止';
    document.querySelectorAll('.qbtn').forEach(b => b.disabled = true);
  } else {
    const m = 8*60+30 - (new Date().getHours()*60 + new Date().getMinutes());
    const h = Math.floor(m/60), mm = m%60;
    el.innerHTML = `<div class="cutopen">點餐截止：上午 8:30（還有 ${h>0?h+' 小時 '+mm+' 分鐘':mm+' 分鐘'}）</div>`;
  }
}

function today() { const i=(new Date().getDay()+6)%7; return menu[Math.min(i,4)]; }
function resetPick() {
  pick = {};
  const t = today();
  [...t.bento,...t.western].forEach(m => { pick[m.id]={qty:0,set:false,drink:DRINK[0]}; });
}
function mcard(m) {
  const sp = m.set ? `
    <div class="setrow">
      <label class="tog"><input type="checkbox" id="set-${m.id}" onchange="togSet('${m.id}')" disabled><span class="track"></span></label>
      <span style="font-size:13px;color:#888;">套餐 +$${m.set}</span>
      <select class="dsel hide" id="drk-${m.id}" onchange="pick['${m.id}'].drink=this.value">
        ${DRINK.map(d=>`<option value="${d.name}">${d.name}${d.add>0?' (+$'+d.add+')':''}</option>`).join('')}
      </select>
    </div>` : '';
  return `<div class="card">
    <div class="card-top"><span class="cname">${m.name}</span><span class="cprice">$${m.price}</span></div>
    <div class="row"><label>數量</label>
      <div class="qbox">
        <button class="qbtn" onclick="chgQty('${m.id}',-1)">−</button>
        <span class="qnum" id="q-${m.id}">0</span>
        <button class="qbtn" onclick="chgQty('${m.id}',1)">+</button>
      </div>
    </div>${sp}
    <div class="sub">小計 <span id="s-${m.id}">$0</span></div>
  </div>`;
}
function drawMeals() {
  const t = today();
  document.getElementById('bento-list').innerHTML   = t.bento.length   ? t.bento.map(m=>mcard(m)).join('')   : '<div class="noitem">今日無便當菜單</div>';
  document.getElementById('western-list').innerHTML = t.western.length ? t.western.map(m=>mcard(m)).join('') : '<div class="noitem">今日無西式菜單</div>';
  if (closed()) document.querySelectorAll('.qbtn').forEach(b => b.disabled = true);
}
function switchTab(t) {
  document.getElementById('tab-bento').classList.toggle('hide', t!=='bento');
  document.getElementById('tab-western').classList.toggle('hide', t!=='western');
  document.querySelectorAll('.tabs .tab').forEach((el,i) => el.classList.toggle('on', (i===0&&t==='bento')||(i===1&&t==='western')));
}
function chgQty(id, d) {
  if (closed()) return;
  if (!pick[id]) pick[id]={qty:0,set:false,drink:DRINK[0]};
  const p = pick[id]; p.qty = Math.max(0, p.qty+d);
  document.getElementById(`q-${id}`).textContent = p.qty;
  const cb = document.getElementById(`set-${id}`);
  if (cb) { cb.disabled=p.qty===0; if(p.qty===0){p.set=false;cb.checked=false;togSet(id);} }
  calcSub(id); calcTotal();
}
function togSet(id) {
  const p = pick[id]; p.set = document.getElementById(`set-${id}`).checked;
  const sel = document.getElementById(`drk-${id}`);
  if (sel) sel.classList.toggle('hide', !p.set);
  calcSub(id); calcTotal();
}
function calcSub(id) {
  const t = today(), all = [...t.bento,...t.western];
  const m = all.find(x=>x.id===id); if(!m)return;
  const p = pick[id]||{qty:0};
  document.getElementById(`s-${id}`).textContent = `$${p.qty*(m.price+(p.set&&m.set?m.set:0))}`;
}
function calcTotal() {
  const t = today(), all = [...t.bento,...t.western];
  let sum=0, cnt=0;
  all.forEach(m => { const p=pick[m.id]||{qty:0}; sum+=p.qty*(m.price+(p.set&&m.set?m.set:0)); cnt+=p.qty; });
  document.getElementById('ttl').textContent = `$${sum}`;
  document.getElementById('cnt').textContent = `${cnt} 項`;
  if (!closed()) document.getElementById('btnSend').disabled = cnt===0;
}
async function submitOrder() {
  const t = today(), all = [...t.bento,...t.western];
  const lines = all.filter(m=>pick[m.id]&&pick[m.id].qty>0).map(m => {
    const p = pick[m.id];
    return `${m.name} ×${p.qty}${p.set?`（套餐・${p.drink}）`:''}`;
  });
  if (!lines.length) return;
  let sum = 0;
  all.forEach(m => { const p=pick[m.id]||{qty:0}; sum+=p.qty*(m.price+(p.set&&m.set?m.set:0)); });
  USERS[me].balance -= sum;
  USERS[me].log.push({ desc:`點餐 ${lines.join('、')}`, amt:-sum, time:ts() });
  await saveUser(me);
  toast(`訂單送出！扣款 $${sum}`);
  drawBalance();
  resetPick(); drawMeals(); calcTotal();
}

function drawUsers() {
  const list = Object.keys(USERS);
  document.getElementById('ulist').innerHTML = list.map(n => {
    const u = USERS[n];
    return `<div class="ucard">
      <div class="uhead" onclick="togUser('${n}')">
        <span class="uname">${n}</span>
        <div style="display:flex;align-items:center;gap:4px;">
          <span class="ubal" id="b-${n}">$${u.balance}</span>
          <span class="arr" id="arr-${n}">▶</span>
        </div>
      </div>
      <div class="ubody" id="ub-${n}">
        <div class="amtrow">
          <input type="number" class="amtin" id="a-${n}" placeholder="金額" min="1" inputmode="numeric">
          <button class="btn-add" onclick="adjBal('${n}',1)">+ 儲值</button>
          <button class="btn-sub" onclick="adjBal('${n}',-1)">− 扣款</button>
        </div>
        <div class="loglbl">消費記錄</div>
        <div id="lg-${n}">${drawLog(n)}</div>
      </div>
    </div>`;
  }).join('');
}
function drawLog(n) {
  const lg = USERS[n].log;
  if (!lg.length) return `<div class="lognil">尚無記錄</div>`;
  return [...lg].reverse().map(l => `
    <div class="logrow">
      <div><div class="logtext">${l.desc}</div><div class="logtime">${l.time}</div></div>
      <span class="logamt ${l.amt>0?'up':'dn'}">${l.amt>0?'+':''}$${Math.abs(l.amt)}</span>
    </div>`).join('');
}
function togUser(n) {
  const b=document.getElementById(`ub-${n}`), a=document.getElementById(`arr-${n}`);
  const o=b.classList.toggle('open'); a.style.transform=o?'rotate(90deg)':'';
}
async function adjBal(n, dir) {
  const inp = document.getElementById(`a-${n}`);
  const amt = parseInt(inp.value);
  if (!amt||amt<=0) { toast('請輸入有效金額'); return; }
  USERS[n].balance += dir*amt;
  if (USERS[n].balance<0) USERS[n].balance=0;
  USERS[n].log.push({ desc:dir>0?'儲值':'扣款', amt:dir*amt, time:ts() });
  await saveUser(n);
  document.getElementById(`b-${n}`).textContent = `$${USERS[n].balance}`;
  document.getElementById(`lg-${n}`).innerHTML = drawLog(n);
  inp.value = '';
  toast(dir>0 ? `已幫 ${n} 儲值 $${amt}` : `已扣除 ${n} $${amt}`);
}

function drawMenuPage() {
  const n=new Date(), mon=new Date(n);
  mon.setDate(n.getDate()-((n.getDay()+6)%7));
  const fri=new Date(mon); fri.setDate(mon.getDate()+4);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('wklbl').textContent = `${fmt(mon)} – ${fmt(fri)}`;
  document.getElementById('dtabs').innerHTML = DAYS.map((d,i) =>
    `<div class="dtab${i===day?' on':''}" onclick="switchDay(${i})">週${d}</div>`
  ).join('');
  drawDay();
}
function switchDay(i) {
  day = i;
  document.querySelectorAll('.dtab').forEach((t,j) => t.classList.toggle('on', j===i));
  drawDay();
}
function drawDay() {
  const m = menu[day]; let h='';
  h += `<div class="slbl">便當（${m.bento.length} 項）</div>`;
  h += m.bento.length ? m.bento.map(x=>mrow(x,'bento')).join('') : `<div class="nil">尚無便當</div>`;
  h += `<div class="sep">西式（${m.western.length} 項）</div>`;
  h += m.western.length ? m.western.map(x=>mrow(x,'western')).join('') : `<div class="nil">尚無西式</div>`;
  document.getElementById('mcontent').innerHTML = h;
}
function mrow(m, t) {
  const meta = t==='western'&&m.set ? `$${m.price}・套餐 +$${m.set}` : `$${m.price}`;
  return `<div class="mrow">
    <div class="minfo"><div class="mname">${m.name}</div><div class="mmeta">${meta}</div></div>
    <button class="btn-edit" onclick="openEdit('${m.id}','${t}')">編輯</button>
    <button class="btn-del" onclick="delMeal('${m.id}','${t}')">刪除</button>
  </div>`;
}
function setType(t) {
  type = t;
  document.getElementById('tBento').classList.toggle('on', t==='bento');
  document.getElementById('tWest').classList.toggle('on', t==='western');
  document.getElementById('nSetRow').classList.toggle('hide', t==='bento');
}
async function addMeal() {
  const name  = document.getElementById('nName').value.trim();
  const price = parseInt(document.getElementById('nPrice').value);
  if (!name||!price||price<=0) { toast('請填寫名稱與價格'); return; }
  const item = { id:uid(), name, price };
  if (type==='western') { const sp=parseInt(document.getElementById('nSet').value); if(sp>0)item.set=sp; }
  menu[day][type].push(item);
  pick[item.id] = { qty:0, set:false, drink:DRINK[0] };
  document.getElementById('nName').value = '';
  document.getElementById('nPrice').value = '';
  document.getElementById('nSet').value = '';
  await saveMenu();
  drawDay();
  toast(`已新增「${name}」`);
}
async function delMeal(id, t) {
  const arr=menu[day][t], i=arr.findIndex(m=>m.id===id);
  if (i>=0) { const n=arr[i].name; arr.splice(i,1); await saveMenu(); drawDay(); toast(`已刪除「${n}」`); }
}
function openEdit(id, t) {
  const m = menu[day][t].find(x=>x.id===id); if(!m)return;
  edit = { id, t };
  document.getElementById('eName').value  = m.name;
  document.getElementById('ePrice').value = m.price;
  document.getElementById('eSet').value   = m.set||'';
  document.getElementById('eSet').closest('.inrow').style.display = t==='western'?'flex':'none';
  document.getElementById('editPop').classList.remove('hide');
}
function closePop() { document.getElementById('editPop').classList.add('hide'); edit=null; }
async function saveEdit() {
  if (!edit) return;
  const {id, t} = edit;
  const m = menu[day][t].find(x=>x.id===id);
  const name  = document.getElementById('eName').value.trim();
  const price = parseInt(document.getElementById('ePrice').value);
  if (!name||!price||price<=0) { toast('請填寫名稱與價格'); return; }
  m.name=name; m.price=price;
  if (t==='western') { const sp=parseInt(document.getElementById('eSet').value); m.set=sp>0?sp:undefined; }
  await saveMenu();
  closePop(); drawDay(); toast(`已更新「${name}」`);
}

setInterval(() => { if(me) drawCut(); }, 30000);

//donate
let donateAmt = 0;

function setDonate(amt) {
  donateAmt = amt;
  document.querySelectorAll('#pgDonate .tbtn').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
}

async function doDonate() {
  const err = document.getElementById('dErr');
  const pin = document.getElementById('dPin').value;
  if (!donateAmt) { err.textContent='請選擇金額'; err.style.display='block'; return; }
  if (pin !== USERS[me].pin) { err.textContent='密碼錯誤'; err.style.display='block'; document.getElementById('dPin').value=''; return; }
  if (USERS[me].balance < donateAmt) { err.textContent='餘額不足'; err.style.display='block'; return; }
  USERS[me].balance -= donateAmt;
  USERS['admin'].balance += donateAmt;
  USERS[me].log.push({ desc:`斗內 admin`, amt:-donateAmt, time:ts() });
  USERS['admin'].log.push({ desc:`收到 ${me} 斗內`, amt:donateAmt, time:ts() });
  await saveUser(me);
  await saveUser('admin');
  drawBalance();
  toast(`成功斗內 $${donateAmt}！`);
  const coin = document.createElement('div');
  coin.className = 'coin';
  coin.textContent = '💰';
  document.body.appendChild(coin);
  setTimeout(() => coin.remove(), 800);
  donateAmt = 0;
  document.getElementById('dPin').value = '';
  document.querySelectorAll('#pgDonate .tbtn').forEach(b => b.classList.remove('on'));
  err.style.display = 'none';
  go('pgOrder');
}

function setDonateCustom(val) {
  donateAmt = parseInt(val) || 0;
  document.querySelectorAll('#pgDonate .tbtn').forEach(b => b.classList.remove('on'));
}
